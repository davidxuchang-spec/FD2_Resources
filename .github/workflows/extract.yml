name: FD2_Text_Test
on: [workflow_dispatch]

jobs:
  test_decode:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Decode Test
        run: |
          python -c "
          import os
          if os.path.exists('FDTXT.DAT'):
              with open('FDTXT.DAT', 'rb') as f:
                  data = f.read()
              try:
                  # 从 0x92 偏移量开始截取 2000 个字节进行测试
                  # 强制使用 Big5 编码解码，并转为通用的 UTF-8
                  text = data[0x92:2000].decode('big5', errors='ignore')
                  with open('test_result.txt', 'w', encoding='utf-8') as f:
                      f.write(text)
                  print('Success: Test file generated.')
              except Exception as e:
                  print(f'Error: {e}')
          else:
              print('Error: FDTXT.DAT not found.')
          "

      - name: Upload Test Result
        uses: actions/upload-artifact@v4
        with:
          name: Test_Plot_Result
          path: test_result.txt
