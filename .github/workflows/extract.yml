name: FD2_Data_Detective
on: [workflow_dispatch]

jobs:
  detect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Data Analysis
        run: |
          python -c "
          import os

          file_path = 'FDTXT.DAT'
          if not os.path.exists(file_path):
              print('Error: File not found')
              exit()

          with open(file_path, 'rb') as f:
              raw_data = f.read()

          # 1. 提取前 500 字节的十六进制，用于分析文件头
          hex_head = raw_data[:500].hex(' ')
          with open('file_signature.txt', 'w') as f:
              f.write('--- FILE HEX HEAD ---\n')
              f.write(hex_head)

          # 2. 尝试在地毯式搜索中识别 Big5 和 GBK
          encodings = ['big5', 'gbk', 'utf-16']
          found_segments = []

          for enc in encodings:
              found_segments.append(f'\n--- TESTING ENCODING: {enc} ---\n')
              # 每隔 1 字节尝试解码，抓取长度超过 4 的连续字符串
              current_str = b''
              for b in raw_data:
                  if b > 0x7F: # 可能是中文字符的一部分
                      current_str += bytes([b])
                  else:
                      if len(current_str) > 4:
                          try:
                              decoded = current_str.decode(enc)
                              found_segments.append(decoded)
                          except:
                              pass
                      current_str = b''
          
          with open('detect_results.txt', 'w', encoding='utf-8') as f:
              f.write('\n'.join(found_segments))
          "

      - name: Upload Diagnostic Results
        uses: actions/upload-artifact@v4
        with:
          name: Diagnostic_Report
          path: |
            file_signature.txt
            detect_results.txt
